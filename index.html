<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>
    <link rel="icon" href="profile.jpg?v=1" type="image/jpeg" />
    <link rel="shortcut icon" href="profile.jpg?v=1" type="image/jpeg" />
    <link rel="apple-touch-icon" href="profile.jpg?v=1" />
    <style>
      body {
        margin: 0;
        overflow: hidden; /* Prevent scrollbars */
        background-color: #1a1a1a; /* Dark background for better contrast */
        font-family: sans-serif;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      /* --- Click hint (minimal) --- */
      #click-hint {
        position: fixed;
        left: 50%;
        bottom: 8%;
        transform: translateX(-50%);
        z-index: 10;
        pointer-events: none; /* don't block 3D interaction */
        user-select: none;
        text-align: center;
        font-size: clamp(11px, 1.6vw, 14px);
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.92);
        white-space: nowrap;
        padding: 9px 20px;
        border-radius: 999px;
        background: rgba(20, 20, 24, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.28);
        animation: hint-fade 2.6s ease-in-out infinite;
        transition: opacity 0.6s ease;
      }
      #click-hint.is-hidden {
        opacity: 0;
      }
      @keyframes hint-fade {
        0%,
        100% {
          opacity: 0.7;
        }
        50% {
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #click-hint {
          animation: none;
          opacity: 0.9;
        }
      }

      /* --- Contact send status toast --- */
      #contact-status {
        position: fixed;
        left: 50%;
        top: 7%;
        transform: translateX(-50%) translateY(-8px);
        z-index: 30;
        pointer-events: none;
        user-select: none;
        white-space: nowrap;
        font-size: clamp(12px, 1.7vw, 15px);
        font-weight: 600;
        letter-spacing: 0.04em;
        color: rgba(255, 255, 255, 0.95);
        padding: 10px 20px;
        border-radius: 999px;
        background: rgba(20, 20, 24, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.16);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 6px 22px rgba(0, 0, 0, 0.3);
        opacity: 0;
        transition:
          opacity 0.35s ease,
          transform 0.35s ease;
      }
      #contact-status.is-visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      #contact-status.is-error {
        background: rgba(120, 30, 26, 0.62);
        border-color: rgba(255, 160, 150, 0.3);
      }
      @media (prefers-reduced-motion: reduce) {
        #contact-status {
          transition: opacity 0.2s ease;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="click-hint" aria-hidden="true">tap to open</div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
